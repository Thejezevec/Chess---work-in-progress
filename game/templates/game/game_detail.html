<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <title>{{game.player_white}} vs {{game.player_black}}</title>
    <style>
        table{
            border-collapse: collapse;
            margin: 20px 0;
        }
        td {
            width:40px;
            height: 40px;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #000;
            font-size: 24px;
        }
        .light {
            background-color: #f0d9b5;
        }
        .dark {
            background-color: #b58863;
        }
        td.selected {
            outline: 3px solid red;
        }
        #status {
            front-size: 18px;
            front-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>
<body>

<h1>{{ game.player_white }} vs {{ game.player_black }}</h1>

{% if game.winner %}
    <p id="status">Winner: {{ game.winner }}</p>
{% elif game.is_draw %}
    <p id="status">Game is a draw</p>
{% else %}
    <p id="status">Game in progress</p>
{% endif %}

<table>
  {% for row in board %}
    <tr>
      {% for square in row.squares %}
         <td data-coord="{{ square.col_letter }}{{ row.row_num }}"
                onclick="squareClicked(this)"
                class="{{ square.color }}">
                {{ square.value }}
        </td>
      {% endfor %}
    </tr>
  {% endfor %}
</table>


<script>
    let selectedSquare = null;
    const gameId = "{{ game.id }}";

    function squareClicked(td) {
        const coord = td.dataset.coord;

        if (!selectedSquare) {
            // First click — select the square
            selectedSquare = coord;
            td.classList.add('selected');
        } else {
            // Second click — attempt move
            const from = selectedSquare;
            const to = coord;

            // Deselect
            document.querySelectorAll("td.selected").forEach(cell => cell.classList.remove('selected'));
            selectedSquare = null;

            if (from === to) return; // clicked same square

            fetch(`/game/${gameId}/move/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ from: from, to: to })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.is_checkmate) {
                        alert(`Šach mat! Vyhrál: ${data.winner}`);
                    } else if (data.is_draw) {
                        alert('Remíza!');
                    }
                    location.reload();
                } else {
                    alert('Neplatný tah: ' + (data.error || ''));
                }
            })
            .catch(error => console.error('Chyba při tahu:', error));
        }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            for (const cookie of document.cookie.split(';')) {
                const trimmed = cookie.trim();
                if (trimmed.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(trimmed.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
